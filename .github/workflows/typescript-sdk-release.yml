name: TypeScript SDK Release

on:
  push:
    tags:
      - "typescript-sdk@*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: sdk/typescript
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: sdk/typescript/package-lock.json
      - run: npm ci
      - name: Validate package
        run: |
          npm run typecheck
          npm run format:check
          npm run build
          npm run test:browser
          npm test
          npm pack --dry-run
      - name: Validate release tag
        if: github.event_name == 'push'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "typescript-sdk@$PACKAGE_VERSION"
      - name: Check whether version already exists
        id: published
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          if npm view "@openviking/sdk@$PACKAGE_VERSION" version --registry=https://registry.npmjs.org >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "@openviking/sdk@$PACKAGE_VERSION already exists; skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish package
        if: steps.published.outputs.exists == 'false'
        env:
          # Required for the first automated publish. After @openviking/sdk has
          # a Trusted Publisher configured for this workflow, npm prefers OIDC.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
